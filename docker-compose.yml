version: "3.9"

services:
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - LOG_LEVEL=INFO
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import asyncio; from config import settings; print(settings.bot_name)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s
